name: build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  windows:
    name: Windows PyInstaller build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build dwg2ifc installer
        shell: pwsh
        run: |
          .\scripts\build_installer.ps1

      - name: Smoke check exe artifact
        shell: pwsh
        run: |
          # The bundled exe is windowed (console=False), so `--version`
          # cannot write to stdout reliably under PyInstaller. We simply
          # verify the artifact exists and has plausible size (> 50 MB).
          # Filter both .sha256 sidecars and *Setup* installer artifacts.
          $exe = Get-ChildItem dist/dwg2ifc-*.exe `
            | Where-Object { $_.Name -notmatch '\.sha256$' -and $_.Name -notlike "*Setup*" } `
            | Select-Object -First 1
          if (-not $exe) { throw "No dwg2ifc-*.exe in dist/" }
          if ($exe.Length -lt 50MB) { throw "exe smaller than 50 MB: $($exe.Length)" }
          Write-Host "Smoke OK: $($exe.Name) ($([int]($exe.Length/1MB)) MB)"

      - name: Smoke check installer artifact
        shell: pwsh
        run: |
          $setup = Get-ChildItem dist/dwg2ifc-Setup-*.exe | Select-Object -First 1
          if (-not $setup) { throw "No dwg2ifc-Setup-*.exe in dist/" }
          if ($setup.Length -lt 30MB) { throw "installer smaller than 30 MB: $($setup.Length)" }
          Write-Host "Installer OK: $($setup.Name) ($([int]($setup.Length/1MB)) MB)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dwg2ifc-windows
          path: |
            dist/dwg2ifc-*.exe
            dist/dwg2ifc-*.exe.sha256
          if-no-files-found: error

  linux-smoke:
    name: Linux PyInstaller smoke build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Qt runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Smoke build dwg2ifc
        run: |
          chmod +x scripts/build_exe.sh
          ./scripts/build_exe.sh

      - name: Plan F quality gate (ifcopenshell.validate)
        run: |
          uv sync --all-extras
          uv run pytest tests/test_quality.py -q --tb=short
