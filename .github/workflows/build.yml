name: build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  windows:
    name: Windows PyInstaller build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build dxf2ifc.exe
        shell: pwsh
        run: |
          .\scripts\build_exe.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxf2ifc-windows
          path: |
            dist/dxf2ifc-*.exe
            dist/dxf2ifc-*.exe.sha256
          if-no-files-found: error

  linux-smoke:
    name: Linux PyInstaller smoke build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Qt runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Smoke build dxf2ifc
        run: |
          chmod +x scripts/build_exe.sh
          ./scripts/build_exe.sh
