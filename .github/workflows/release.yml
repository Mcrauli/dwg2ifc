name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows release build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build dxf2ifc.exe
        shell: pwsh
        run: |
          .\scripts\build_exe.ps1

      - name: Smoke test --version
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist/dxf2ifc-*.exe | Select-Object -First 1
          if (-not $exe) { throw "No dxf2ifc-*.exe in dist/" }
          $output = & $exe.FullName --version
          if ($LASTEXITCODE -ne 0) { throw "exit code $LASTEXITCODE" }
          if ($output -notmatch "dxf2ifc") { throw "missing version banner: $output" }
          Write-Host "Smoke OK: $output"

      - name: Bundle LICENSES.md
        shell: pwsh
        run: |
          $out = "dist/LICENSES.md"
          $sections = @(
            "# Third-party licenses bundled with dxf2ifc.exe",
            "",
            "## Fonts (Inter, Space Grotesk, JetBrains Mono — SIL Open Font License)",
            "",
            (Get-Content -Raw assets/fonts/LICENSES.md),
            "",
            "## ifcopenshell — LGPL-3.0",
            "",
            "ifcopenshell is bundled at runtime. Source and full LGPL-3.0 text:",
            "https://github.com/IfcOpenShell/IfcOpenShell",
            "",
            "## PySide6 — LGPL-3.0",
            "",
            "PySide6 (Qt for Python) is bundled at runtime. Source and full LGPL-3.0 text:",
            "https://wiki.qt.io/Qt_for_Python",
            "",
            "## Python — PSF License v2",
            "",
            "Python interpreter (CPython) is bundled at runtime. Full PSF License v2 text:",
            "https://docs.python.org/3/license.html"
          )
          $sections -join "`n" | Set-Content -Encoding UTF8 -Path $out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxf2ifc-windows-release
          path: |
            dist/dxf2ifc-*.exe
            dist/dxf2ifc-*.exe.sha256
            dist/LICENSES.md
          if-no-files-found: error
