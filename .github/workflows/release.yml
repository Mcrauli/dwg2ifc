name: release

# Code-signing setup (SignPath.io OSS Foundation, free for OSS projects):
#
# 1. Sign up at https://signpath.io with the GitHub account that owns this
#    repo (Mcrauli). Apply for the OSS Foundation tier — free, ~1–2 weeks
#    to approve.
# 2. After approval, in the SignPath UI:
#       a. Connect this GitHub repo as a "trusted build system"
#       b. Note the organization-id (UUID), project-slug, and create
#          a signing-policy-slug (e.g. "release-signing")
#       c. Issue an API token with submit-signing-request permission
# 3. In the GitHub repo settings → Secrets and variables → Actions:
#       - Secret:    SIGNPATH_API_TOKEN
#       - Variable:  SIGNPATH_ORGANIZATION_ID
#       - Variable:  SIGNPATH_PROJECT_SLUG
#       - Variable:  SIGNPATH_SIGNING_POLICY_SLUG
# 4. Tag a release. The "Sign with SignPath" step auto-enables when all
#    four are present; until then releases ship unsigned (no failure).

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # required by SignPath GitHub Actions connector (OIDC)

jobs:
  windows:
    name: Windows release build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build dwg2ifc.exe
        shell: pwsh
        run: |
          .\scripts\build_exe.ps1

      - name: Smoke check exe artifact
        shell: pwsh
        run: |
          # The bundled exe is windowed (console=False), so `--version`
          # cannot write to stdout reliably under PyInstaller. We simply
          # verify the artifact exists and has plausible size (> 50 MB).
          $exe = Get-ChildItem dist/dwg2ifc-*.exe | Where-Object { $_.Name -notmatch '\.sha256$' } | Select-Object -First 1
          if (-not $exe) { throw "No dwg2ifc-*.exe in dist/" }
          if ($exe.Length -lt 50MB) { throw "exe smaller than 50 MB: $($exe.Length)" }
          Write-Host "Smoke OK: $($exe.Name) ($([int]($exe.Length/1MB)) MB)"

      # ────── Code signing ──────────────────────────────────────────────
      # SignPath consumes a GitHub Actions artifact, signs it, and
      # publishes the signed bytes back. The unsigned artifact upload
      # below is separate from the release-asset upload further down.

      - name: Upload unsigned exe for SignPath
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: dwg2ifc-unsigned
          path: dist/dwg2ifc-*.exe
          if-no-files-found: error

      - name: Check SignPath configuration
        id: signpath-check
        shell: bash
        env:
          TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          ORG_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          PROJECT: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          POLICY: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$ORG_ID" ] && [ -n "$PROJECT" ] && [ -n "$POLICY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "::notice::SignPath signing enabled — release exe will be code-signed"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SignPath secrets/vars missing — release will be UNSIGNED. To enable: set secrets.SIGNPATH_API_TOKEN + vars.SIGNPATH_ORGANIZATION_ID + vars.SIGNPATH_PROJECT_SLUG + vars.SIGNPATH_SIGNING_POLICY_SLUG (see comment block at top of release.yml)"
          fi

      - name: Sign with SignPath
        if: steps.signpath-check.outputs.enabled == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist/

      - name: Regenerate SHA256 sidecar after signing
        if: steps.signpath-check.outputs.enabled == 'true'
        shell: pwsh
        run: |
          # Signing changes the exe bytes (Authenticode signature appended),
          # so the .sha256 produced by build_exe.ps1 is now stale.
          $exe = Get-ChildItem dist/dwg2ifc-*.exe | Where-Object { $_.Name -notmatch '\.sha256$' } | Select-Object -First 1
          if (-not $exe) { throw "No signed exe in dist/ after SignPath step" }
          $h = (Get-FileHash -Algorithm SHA256 -Path $exe.FullName).Hash
          Set-Content -Path "$($exe.FullName).sha256" -Value "$h  $($exe.Name)"
          # Verify the exe is actually signed
          $sig = Get-AuthenticodeSignature $exe.FullName
          if ($sig.Status -ne "Valid") {
            throw "Signed exe failed Authenticode verification: $($sig.Status) — $($sig.StatusMessage)"
          }
          Write-Host "Signed by: $($sig.SignerCertificate.Subject)"
          Write-Host "New SHA256: $h  $($exe.Name)"

      - name: Bundle LICENSES.md
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          $out = "dist/LICENSES.md"
          $sections = @(
            "# Third-party licenses bundled with dwg2ifc.exe",
            "",
            "## Fonts (Inter, Space Grotesk, JetBrains Mono — SIL Open Font License)",
            "",
            (Get-Content -Raw assets/fonts/LICENSES.md),
            "",
            "## ifcopenshell — LGPL-3.0",
            "",
            "ifcopenshell is bundled at runtime. Source and full LGPL-3.0 text:",
            "https://github.com/IfcOpenShell/IfcOpenShell",
            "",
            "## PySide6 — LGPL-3.0",
            "",
            "PySide6 (Qt for Python) is bundled at runtime. Source and full LGPL-3.0 text:",
            "https://wiki.qt.io/Qt_for_Python",
            "",
            "## Python — PSF License v2",
            "",
            "Python interpreter (CPython) is bundled at runtime. Full PSF License v2 text:",
            "https://docs.python.org/3/license.html"
          )
          $sections -join "`n" | Set-Content -Encoding UTF8 -Path $out

      - name: Build dwg2ifc installer
        shell: pwsh
        run: |
          .\scripts\build_installer.ps1

      - name: Smoke check artifacts
        shell: pwsh
        run: |
          # Windowed PyInstaller exe (console=False) cannot reliably write to
          # stdout, so smoke is artifact-existence + plausible size.
          $exe = Get-ChildItem dist/dwg2ifc-*.exe `
            | Where-Object { $_.Name -notlike "*Setup*" } `
            | Select-Object -First 1
          if (-not $exe) { throw "No dwg2ifc-*.exe in dist/" }
          if ($exe.Length -lt 50MB) { throw "exe smaller than 50 MB: $($exe.Length)" }
          Write-Host "Exe OK      : $($exe.Name) ($([int]($exe.Length/1MB)) MB)"

          $setup = Get-ChildItem dist/dwg2ifc-Setup-*.exe | Select-Object -First 1
          if (-not $setup) { throw "No dwg2ifc-Setup-*.exe in dist/" }
          if ($setup.Length -lt 30MB) { throw "installer smaller than 30 MB: $($setup.Length)" }
          Write-Host "Installer OK: $($setup.Name) ($([int]($setup.Length/1MB)) MB)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dwg2ifc-windows-release
          path: |
            dist/dwg2ifc-*.exe
            dist/dwg2ifc-*.exe.sha256
            dist/dwg2ifc-Setup-*.exe
            dist/dwg2ifc-Setup-*.exe.sha256
            dist/LICENSES.md
          if-no-files-found: error

      - name: Publish GitHub prerelease
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          # Include both the raw exe and the Inno Setup installer
          # plus their .sha256 sidecars in the GitHub release.
          $assets = @(
            (Get-ChildItem dist/dwg2ifc-*.exe `
              | Where-Object { $_.Name -notmatch '\.sha256$' }).FullName,
            (Get-ChildItem dist/dwg2ifc-*.exe.sha256).FullName,
            "dist/LICENSES.md"
          )
          # Publish as prerelease (not draft) so the GUI's auto-update
          # banner picks it up immediately. The updater filters drafts
          # but accepts prereleases — and every 0.2.0a* tag is alpha
          # quality anyway.
          #
          # If a release for this tag already exists (e.g. manually created
          # before the workflow ran), delete it first so gh release create
          # does not fail with "a release with the same tag name already
          # exists" and accidentally leave the wrong exe in place.
          $existing = gh release view $tag --repo $env:GITHUB_REPOSITORY 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Existing release found for $tag — deleting before recreate"
            gh release delete $tag --repo $env:GITHUB_REPOSITORY --yes --cleanup-tag=false
            if ($LASTEXITCODE -ne 0) { throw "gh release delete failed" }
          }
          gh release create $tag @assets `
            --title $tag `
            --notes-file CHANGELOG.md `
            --prerelease

      - name: Trigger autocad-lisp-ohjeet version-pin sync
        # Lahettaa repository_dispatch -eventin Mcrauli/autocad-lisp-ohjeet:lle
        # joka triggeroi sen sync-dwg2ifc-version.yml -workflow:n ja
        # paivittaa dwg2ifc.html-sivun pinnauksen tahan tagiin saman tien
        # (muuten cron paivittaa tunnin sisalla).
        #
        # Vaatii repository_dispatch-permissioilla varustetun PAT-tokenin
        # secrets-nimella SYNC_PAT (Settings -> Secrets and variables ->
        # Actions). Token tarvitsee:
        #   - Fine-grained PAT: repository access = Mcrauli/autocad-lisp-ohjeet,
        #     permissions = Contents: read + Metadata: read + Actions: write
        # Jos token puuttuu, step skipataan hiljaa — cron toimii silti.
        if: env.SYNC_PAT != ''
        shell: pwsh
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          gh api repos/Mcrauli/autocad-lisp-ohjeet/dispatches `
            -X POST `
            -f event_type=dwg2ifc-release `
            -F "client_payload[tag]=${env:GITHUB_REF_NAME}"
          Write-Host "Sync dispatch sent for $env:GITHUB_REF_NAME"
