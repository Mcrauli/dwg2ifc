# -----------------------------------------------------------------------------
# Section 2: Drain pipes (refrigeration condensate) — RAVA LVI-TUOTEOSA
# T-LVI-04-01-001 (Viemäriputki) + LVI-JARJESTELMA J-LVI-04-04 (Viemäri –
# kondenssi). DRAINPIPE is not in IFC4's IfcPipeSegmentTypeEnum, so
# add_pipe_segment maps it to USERDEFINED + ObjectType="DRAINPIPE".
#
# Three rules — one per nominal diameter (32 / 50 / 75 mm) — match the
# VPUTKI-* dynamic blocks generated by autocad-lisp-ohjeet/files/vputki.lsp.
# Layer name encodes the size; preprocessing.py explode-filter handles the
# block insertion as LWPOLYLINE+thickness (same pattern as KLHYLLY).
#
# To draw drainage on a different RAVA system code (e.g. J-LVI-04-01
# jätevesi), edit `system_name` + `fi_sijainti` in this file or add a
# parallel rule with a different layer prefix.
# -----------------------------------------------------------------------------

[[rules]]
layer_pattern = "KYL-VIEMARI-32"
ifc_type = "IfcPipeSegment"
predefined_type = "DRAINPIPE"
domain = "KYL"
lvi_code = "T-LVI-04-01-001"
system_name = "Viemäri - kondenssi"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 32.0 } }
fi_komponentti = { paaryhma = "PUTKISTOT - LVI", alaryhma = "VIEMÄRIPUTKISTOT", yleisnimi = "Kondenssiviemäri", yleistunnus = "KDV" }
fi_sijainti = { jarjestelmien_nimet = "Viemäri - kondenssi", jarjestelmien_tunnukset = "J-LVI-04-04" }
fi_tekninen = { Materiaali = "Muovi (PP)", Seinamapaksuus = "1.8 mm" }

[[rules]]
layer_pattern = "KYL-VIEMARI-50"
ifc_type = "IfcPipeSegment"
predefined_type = "DRAINPIPE"
domain = "KYL"
lvi_code = "T-LVI-04-01-001"
system_name = "Viemäri - kondenssi"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 50.0 } }
fi_komponentti = { paaryhma = "PUTKISTOT - LVI", alaryhma = "VIEMÄRIPUTKISTOT", yleisnimi = "Kondenssiviemäri", yleistunnus = "KDV" }
fi_sijainti = { jarjestelmien_nimet = "Viemäri - kondenssi", jarjestelmien_tunnukset = "J-LVI-04-04" }
fi_tekninen = { Materiaali = "Muovi (PP)", Seinamapaksuus = "1.8 mm" }

[[rules]]
layer_pattern = "KYL-VIEMARI-75"
ifc_type = "IfcPipeSegment"
predefined_type = "DRAINPIPE"
domain = "KYL"
lvi_code = "T-LVI-04-01-001"
system_name = "Viemäri - kondenssi"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 75.0 } }
fi_komponentti = { paaryhma = "PUTKISTOT - LVI", alaryhma = "VIEMÄRIPUTKISTOT", yleisnimi = "Kondenssiviemäri", yleistunnus = "KDV" }
fi_sijainti = { jarjestelmien_nimet = "Viemäri - kondenssi", jarjestelmien_tunnukset = "J-LVI-04-04" }
fi_tekninen = { Materiaali = "Muovi (PP)", Seinamapaksuus = "1.8 mm" }

# Fallback for legacy/general drain layers (KYL-VIEMARI-LATTIA, -KATTO,
# -110 etc.) that don't match the size-specific VPUTKI rules above.
# First-match-wins ordering: the 32/50/75 rules above take precedence,
# this catches everything else with default 110mm + "Sulanapitoviemäri".
[[rules]]
layer_pattern = "KYL-VIEMARI*"
ifc_type = "IfcPipeSegment"
predefined_type = "DRAINPIPE"
domain = "KYL"
lvi_code = "T-LVI-04-01-001"
system_name = "Viemäri - kondenssi"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 110.0 } }
fi_komponentti = { paaryhma = "PUTKISTOT - LVI", alaryhma = "VIEMÄRIPUTKISTOT", yleisnimi = "Sulanapitoviemäri", yleistunnus = "KDV" }
fi_sijainti = { jarjestelmien_nimet = "Viemäri - kondenssi", jarjestelmien_tunnukset = "J-LVI-04-04" }

# -----------------------------------------------------------------------------
# Section 2b: MagiCAD-drawn refrigeration pipes + devices (v0.1.19+).
#
# These layers are populated by MagiCAD HP/Cooling, where most entities are
# ACAD_PROXY_ENTITY records. dwg2ifc handles them in two ways:
#  - The ~75% whose proxy_graphic stream ezdxf can decode produce open
#    polylines (centrelines + outlines) that dxf_reader splits into
#    LineGeometry segments — those land here for layer→IFC mapping.
#  - The ~25% that need MagiCAD's free Object Enabler get either real
#    geometry (Object Enabler installed → 3DSOLID via accoreconsole
#    EXPLODE) or a bbox cuboid fallback (Object Enabler missing).
# Either way, the IFC type comes from the layer rule below.
# -----------------------------------------------------------------------------

[[rules]]
layer_pattern = "KYL-JV1"
ifc_type = "IfcPipeSegment"
predefined_type = "CHILLEDWATER"
domain = "KYL"
lvi_code = "T-LVI-02"
system_name = "Jäähdytys - vedenjäähdytyskone"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 28.0 } }
fi_komponentti = { paaryhma = "PUTKISTOT - LVI", alaryhma = "JÄÄHDYTYSVESIPUTKISTOT", yleisnimi = "Jäähdytysvesiputki", yleistunnus = "JV" }
fi_sijainti = { jarjestelmien_nimet = "Jäähdytys - vedenjäähdytyskone", jarjestelmien_tunnukset = "J-LVI-06-07" }

[[rules]]
