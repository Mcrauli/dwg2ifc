predefined_type = "USERDEFINED"
domain = "KYL"
talotekniikka_code = "T-TATE-01-01-099"
system_name = "Refrigeration JV1"
fi_komponentti = { paaryhma = "LAITTEISTOT - LVI", alaryhma = "JÄÄHDYTYSLAITTEET", yleisnimi = "Jäähdytysvesilaite", yleistunnus = "JVL" }

[[rules]]
