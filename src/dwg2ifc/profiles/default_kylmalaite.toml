system_name = "Refrigeration plant"
fi_komponentti = { paaryhma = "LAITTEISTOT - LVI", alaryhma = "KYLMÄLAITTEISTOT", yleisnimi = "Höyrystin", yleistunnus = "HÖ" }

[[rules]]
