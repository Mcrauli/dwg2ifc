# Default "Kylmälaite Talo2000" profile.
# Plan A ships only the exterior wall rule. Plan B adds all other entity types.
# Talo2000 codes verified against Solibri Talo2000.classification and
# RT 10-10962 Talo 2000 Hankenimikkeistö (see design spec § "YTV 2012 sources reviewed").

[profile]
name = "Kylmälaite Talo2000 v1"
ifc_schema = "IFC4"
# storey_z_levels_mm: list of base elevations (mm) for IfcBuildingStorey,
# strictly increasing. Default = single ground-floor storey at z=0.
# Multi-storey example: storey_z_levels_mm = [0.0, 3500.0, 7000.0]
storey_z_levels_mm = [0.0]

# Optional projected CRS + IfcMapConversion (Plan G).
# Uncomment and adjust eastings_mm / northings_mm to your site location
# (Helsinki Mannerheimintie 1 sample below in ETRS-TM35FIN / EPSG:3067).
#
# [profile.crs]
# epsg_code = "EPSG:3067"
# name = "ETRS-TM35FIN"
# geodetic_datum = "ETRS89"
# eastings_mm = 25496000.0
# northings_mm = 6672000.0
# orthogonal_height_mm = 0.0
# x_axis_abscissa = 1.0
# x_axis_ordinate = 0.0
# scale = 1.0

[[rules]]
layer_pattern = "KYL-ULKOSEINA*"
ifc_type = "IfcWall"
predefined_type = "STANDARD"
domain = "ARK"
talo2000_code = "1241"
talo2000_name = "Ulkoseinät"
default_height_mm = 3000
default_thickness_mm = 200

