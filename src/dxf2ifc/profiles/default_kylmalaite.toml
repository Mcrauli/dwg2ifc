# Default "Kylmälaite" profile — refrigeration design only.
#
# Scope: only entities a Finnish refrigeration designer (kylmälaitesuunnittelija)
# actually models. Architectural elements (walls, slabs, doors, windows, cold-room
# panels) are out of scope and intentionally NOT mapped — the architect handles
# those.
#
# Domain rule:
# - Cold-storage shelving + refrigeration equipment + pipes → KYL domain
#   (kylmälaitesuunnittelu) with RAVA-LVI / RAVA-TATE classification codes.
#   The KYL discipline marker keeps refrigeration items distinct from generic
#   talotekniikka in Solibri's "suunnittelualat" view.
# - No ARK/Talo2000 mappings ship by default.
#
# RAVA codes verified against koodistot.suomi.fi (LVI-TUOTEOSA Versio 1.0,
# TALOTEKNIIKKA-TUOTEOSA Versio 1.0). The shelving codes mirror the Granlund/
# Sweco refrigeration reference model (KSM_Jeppis_Pietarsaari_KYL.ifc) which
# classifies KYL-LEVYHYLLY / KYL-TIKASHYLLY as IfcCableCarrierSegment with
# CABLETRAYSEGMENT / CABLELADDERSEGMENT predefined types.

[profile]
name = "Kylmälaite RAVA v1"
ifc_schema = "IFC4"
storey_z_levels_mm = [0.0]

# POSITIO numbering-block linkage. KYL-laitteiden vieressä on Lauri'n
# LISP-työkalulla piirretty positiov2-INSERT joka kantaa
#   NUMERO  → yksilöllinen positionumero
#   TEKSTI  → koneikko-tunnus (esim. "JK1")
# Lähin POSITIO 3 m säteellä linkitetään höyrystimeen / lauhduttimeen /
# kompressoriin → täyttää FI_Komponentti:n Laitetunnus + Laitetunnus,
# yksilöllinen kentät. Hyllyt ja putket pysyvät tunnuksettomina.
[profile.positio]
block_pattern = "positiov2*"
max_distance_mm = 3000.0
apply_to = ["IfcEvaporator", "IfcCondenser", "IfcCompressor"]

# Optional projected CRS + IfcMapConversion (Plan G).
# Uncomment + adjust when site coordinates are known.
#
# [profile.crs]
# epsg_code = "EPSG:3067"
# name = "ETRS-TM35FIN"
# geodetic_datum = "ETRS89"
# eastings_mm = 25496000.0
# northings_mm = 6672000.0
# orthogonal_height_mm = 0.0
# x_axis_abscissa = 1.0
# x_axis_ordinate = 0.0
# scale = 1.0

# -----------------------------------------------------------------------------
# Section 1: Refrigerant pipes — RAVA LVI-TUOTEOSA T-LVI-02 (general).
# LT = low temperature (frozen), MT = medium temperature (chilled).
# -----------------------------------------------------------------------------

[[rules]]
layer_pattern = "LT IMU"
ifc_type = "IfcPipeSegment"
predefined_type = "REFRIGERATION"
domain = "KYL"
lvi_code = "T-LVI-02"
system_name = "Refrigeration LT"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 22.0 } }
fi_komponentti = { paaryhma = "PUTKISTOT - LVI", alaryhma = "KYLMÄAINEPUTKISTOT", yleisnimi = "Kylmäaineputki", yleistunnus = "KP" }

[[rules]]
layer_pattern = "MT IMU"
ifc_type = "IfcPipeSegment"
predefined_type = "REFRIGERATION"
domain = "KYL"
lvi_code = "T-LVI-02"
system_name = "Refrigeration MT"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 18.0 } }
fi_komponentti = { paaryhma = "PUTKISTOT - LVI", alaryhma = "KYLMÄAINEPUTKISTOT", yleisnimi = "Kylmäaineputki", yleistunnus = "KP" }

[[rules]]
layer_pattern = "MT NESTE"
ifc_type = "IfcPipeSegment"
predefined_type = "REFRIGERATION"
domain = "KYL"
lvi_code = "T-LVI-02"
system_name = "Refrigeration MT"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 12.0 } }
fi_komponentti = { paaryhma = "PUTKISTOT - LVI", alaryhma = "KYLMÄAINEPUTKISTOT", yleisnimi = "Kylmäaineputki", yleistunnus = "KP" }

# -----------------------------------------------------------------------------
# Section 2: Drain pipes (defrost) — RAVA LVI-TUOTEOSA T-LVI-04-01-001.
# DRAINPIPE is not in IFC4's IfcPipeSegmentTypeEnum, so add_pipe_segment maps
# it to USERDEFINED + ObjectType="DRAINPIPE".
# -----------------------------------------------------------------------------

[[rules]]
layer_pattern = "KYL-VIEMARI*"
ifc_type = "IfcPipeSegment"
predefined_type = "DRAINPIPE"
domain = "KYL"
lvi_code = "T-LVI-04-01-001"
system_name = "Drainage"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 110.0 } }
fi_komponentti = { paaryhma = "PUTKISTOT - LVI", alaryhma = "VIEMÄRIPUTKISTOT", yleisnimi = "Sulanapitoviemäri", yleistunnus = "SV" }

# -----------------------------------------------------------------------------
# Section 3: Cold-storage shelving — IfcCableCarrierSegment per Granlund
# convention. Tikashylly = ladder rails (CABLELADDERSEGMENT), levyhylly =
# sheet-metal tray shelf (CABLETRAYSEGMENT). RAVA TALOTEKNIIKKA-TUOTEOSA
# T-TATE-01-01-001 "Asennushylly" is the closest official code.
#
# Layer-pattern order matters: KYL-TIKASHYLLY-V* listed before KYL-TIKASHYLLY*
# so the vertical variant resolves first under first-match-wins semantics.
# -----------------------------------------------------------------------------

[[rules]]
layer_pattern = "KYL-TIKASHYLLY-V*"
ifc_type = "IfcCableCarrierSegment"
predefined_type = "CABLELADDERSEGMENT"
domain = "KYL"
talotekniikka_code = "T-TATE-01-01-001"
system_name = "Refrigeration plant"
fi_komponentti = { paaryhma = "TUOTEOSAT - LVI", alaryhma = "ASENNUSHYLLYJÄRJESTELMÄT", yleisnimi = "Tikashylly (pystysuora)", yleistunnus = "AHJ.LVI" }
fi_sijainti = { jarjestelmien_nimet = "Asennushyllyjärjestelmä - LVI", jarjestelmien_tunnukset = "AHJ.LVI" }

[[rules]]
layer_pattern = "KYL-TIKASHYLLY*"
ifc_type = "IfcCableCarrierSegment"
predefined_type = "CABLELADDERSEGMENT"
domain = "KYL"
talotekniikka_code = "T-TATE-01-01-001"
system_name = "Refrigeration plant"
fi_komponentti = { paaryhma = "TUOTEOSAT - LVI", alaryhma = "ASENNUSHYLLYJÄRJESTELMÄT", yleisnimi = "Tikashylly", yleistunnus = "AHJ.LVI" }
fi_sijainti = { jarjestelmien_nimet = "Asennushyllyjärjestelmä - LVI", jarjestelmien_tunnukset = "AHJ.LVI" }

[[rules]]
layer_pattern = "KYL-LEVYHYLLY*"
ifc_type = "IfcCableCarrierSegment"
predefined_type = "CABLETRAYSEGMENT"
domain = "KYL"
talotekniikka_code = "T-TATE-01-01-001"
system_name = "Refrigeration plant"
fi_komponentti = { paaryhma = "TUOTEOSAT - LVI", alaryhma = "ASENNUSHYLLYJÄRJESTELMÄT", yleisnimi = "Levyhylly", yleistunnus = "AHJ.LVI" }
fi_sijainti = { jarjestelmien_nimet = "Asennushyllyjärjestelmä - LVI", jarjestelmien_tunnukset = "AHJ.LVI" }

# -----------------------------------------------------------------------------
# Section 4: Cable carriers (electrical) — RAVA T-TATE-01-01-001.
# -----------------------------------------------------------------------------

[[rules]]
layer_pattern = "KAAPELIHYLLY*"
ifc_type = "IfcCableCarrierSegment"
predefined_type = "CABLETRUNKINGSEGMENT"
domain = "KYL"
talotekniikka_code = "T-TATE-01-01-001"
system_name = "Cable carriers"
fi_komponentti = { paaryhma = "LAITTEISTOT - SÄHKÖ", alaryhma = "KAAPELOINTIJÄRJESTELMÄT", yleisnimi = "Kaapelihylly", yleistunnus = "KH" }

# -----------------------------------------------------------------------------
# Section 5: Refrigeration equipment — RAVA LVI-TUOTEOSA (TATE-domain).
# Patterns use the Ö-spelling AutoCAD layers actually use plus an ASCII
# fallback (str.casefold does NOT fold Ö→o). Stems "HÖYRYSTI"/"LAUHDUTI"
# match both singular ("HÖYRYSTIN") and plural ("HÖYRYSTIMET") forms.
# Aspirational codes (not yet drawn by LISP toolset) are commented:
#   • jäähdytyskompressorikoneikko  T-LVI-01-01-005
#   • vedenjäähdytyskone            T-LVI-01-01-003
#   • kompressorilauhdutin          T-LVI-01-01-019
#   • välijäähdytin                 T-LVI-01-01-024
#   • kylmävesiasema                T-LVI-01-01-004
#   • kylmäainevaraajasäiliö        T-LVI-03-07-012
# -----------------------------------------------------------------------------

[[rules]]
layer_pattern = "KYL-HÖYRYSTI*"
ifc_type = "IfcEvaporator"
domain = "KYL"
lvi_code = "T-LVI-01-01-023"
system_name = "Refrigeration plant"
fi_komponentti = { paaryhma = "LAITTEISTOT - LVI", alaryhma = "KYLMÄLAITTEISTOT", yleisnimi = "Höyrystin", yleistunnus = "HÖY" }

[[rules]]
layer_pattern = "KYL-HOYRYSTI*"
ifc_type = "IfcEvaporator"
domain = "KYL"
lvi_code = "T-LVI-01-01-023"
system_name = "Refrigeration plant"
fi_komponentti = { paaryhma = "LAITTEISTOT - LVI", alaryhma = "KYLMÄLAITTEISTOT", yleisnimi = "Höyrystin", yleistunnus = "HÖY" }

[[rules]]
layer_pattern = "KYL-LAUHDUTI*"
ifc_type = "IfcCondenser"
domain = "KYL"
lvi_code = "T-LVI-01-01-018"
system_name = "Refrigeration plant"
fi_komponentti = { paaryhma = "LAITTEISTOT - LVI", alaryhma = "KYLMÄLAITTEISTOT", yleisnimi = "Lauhdutin", yleistunnus = "LAU" }

[[rules]]
layer_pattern = "KYL-KOMPRESSO*"
ifc_type = "IfcCompressor"
domain = "KYL"
lvi_code = "T-LVI-01-01-017"
system_name = "Refrigeration plant"
fi_komponentti = { paaryhma = "LAITTEISTOT - LVI", alaryhma = "KYLMÄLAITTEISTOT", yleisnimi = "Kompressori", yleistunnus = "KOMP" }
