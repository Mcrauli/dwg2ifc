# Section 6: Kylmäainejärjestelmän putket — RAVA LVI-TUOTEOSA (TATE-domain).
# Virallisessa LVI-TUOTEOSA-koodistossa ei ole erikoistuneita koodeja LT/MT-
# imu/nesteputkille, joten käytämme yleistä T-LVI-02 -kategoriaa ja erotamme
# järjestelmät pset_overrides.NominalDiameter:n + system_name:n kautta.
[[rules]]
layer_pattern = "LT IMU"
ifc_type = "IfcPipeSegment"
predefined_type = "REFRIGERATION"
domain = "TATE"
lvi_code = "T-LVI-02"
system_name = "Refrigeration LT"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 22.0 } }

[[rules]]
layer_pattern = "MT IMU"
ifc_type = "IfcPipeSegment"
predefined_type = "REFRIGERATION"
domain = "TATE"
lvi_code = "T-LVI-02"
system_name = "Refrigeration MT"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 18.0 } }

[[rules]]
layer_pattern = "MT NESTE"
ifc_type = "IfcPipeSegment"
predefined_type = "REFRIGERATION"
domain = "TATE"
lvi_code = "T-LVI-02"
system_name = "Refrigeration MT"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 12.0 } }

# Section 7: Viemäriputket (defrost) — RAVA LVI-TUOTEOSA T-LVI-04-01-001.
# DRAINPIPE ei kuulu IFC4:n IfcPipeSegmentTypeEnumiin, joten add_pipe_segment
# karttoittaa sen USERDEFINED + ObjectType="DRAINPIPE":ksi.
[[rules]]
