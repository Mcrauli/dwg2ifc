# Default "Kylmälaite Talo2000" profile.
# Plan A ships only the exterior wall rule. Plan B adds all other entity types.
# Talo2000 codes verified against Solibri Talo2000.classification and
# RT 10-10962 Talo 2000 Hankenimikkeistö (see design spec § "YTV 2012 sources reviewed").

[profile]
name = "Kylmälaite Talo2000 v1"
ifc_schema = "IFC4"

[[rules]]
layer_pattern = "KYL-ULKOSEINA*"
ifc_type = "IfcWall"
predefined_type = "STANDARD"
talo2000_code = "1241"
talo2000_name = "Ulkoseinät"
default_height_mm = 3000
default_thickness_mm = 200

# -----------------------------------------------------------------------------
# Plan B placeholder rules — uncomment + complete when each section is built.
# Each block lists the target Talo2000 code and the section that activates it.
# -----------------------------------------------------------------------------

# Section 2: VS / lasiväliseinät (1311 / 1312)
[[rules]]
layer_pattern = "KYL-VALISEINA*"
ifc_type = "IfcWall"
predefined_type = "PARTITIONING"
talo2000_code = "1311"
talo2000_name = "Väliseinät"
default_height_mm = 3000
default_thickness_mm = 100

[[rules]]
layer_pattern = "KYL-LASIVALISEINA*"
ifc_type = "IfcWall"
predefined_type = "PARTITIONING"
talo2000_code = "1312"
talo2000_name = "Lasiväliseinät"
default_height_mm = 3000
default_thickness_mm = 50

# Section 3: Laatat AP / VP / YP (1221 / 1235 / 1236)
[[rules]]
layer_pattern = "KYL-ALAPOHJA*"
entity_kind = "POLYLINE"
ifc_type = "IfcSlab"
predefined_type = "FLOOR"
talo2000_code = "1221"
talo2000_name = "Alapohjalaatat"
default_thickness_mm = 200

[[rules]]
layer_pattern = "KYL-VALIPOHJA*"
entity_kind = "POLYLINE"
ifc_type = "IfcSlab"
predefined_type = "FLOOR"
talo2000_code = "1235"
talo2000_name = "Välipohjat"
default_thickness_mm = 250

[[rules]]
layer_pattern = "KYL-YLAPOHJA*"
entity_kind = "POLYLINE"
ifc_type = "IfcSlab"
predefined_type = "ROOF"
talo2000_code = "1236"
talo2000_name = "Yläpohjat"
default_thickness_mm = 300

# Section 4: Ovet — ulko-, väli-, erityisovet (1243 / 1315 / 1316)
[[rules]]
layer_pattern = "KYL-OVET-ULKO*"
entity_kind = "INSERT"
block_name = "OVI-ULKO"
ifc_type = "IfcDoor"
talo2000_code = "1243"
talo2000_name = "Ulko-ovet"

[[rules]]
layer_pattern = "KYL-OVET-VALI*"
entity_kind = "INSERT"
block_name = "OVI-VALI"
ifc_type = "IfcDoor"
talo2000_code = "1315"
talo2000_name = "Väliovet"

[[rules]]
layer_pattern = "KYL-OVET-ERITYIS*"
entity_kind = "INSERT"
block_name = "OVI-ERITYIS"
ifc_type = "IfcDoor"
talo2000_code = "1316"
talo2000_name = "Erityisovet"

# Section 5: Ikkunat (1242)
[[rules]]
layer_pattern = "KYL-IKKUNA*"
entity_kind = "INSERT"
block_name = "IKKUNA"
ifc_type = "IfcWindow"
talo2000_code = "1242"
talo2000_name = "Ikkunat"

