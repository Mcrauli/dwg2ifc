# TATE-only Kylmälaite profile.
# Bugfix 12 — Lauri 2026-04-28: "kylmähuoneen rakenteet ei kuulu ku niit ei
# ees mallineta kylmälaite suunnittelussa". This profile narrows the default
# mapping to puhtaat kylmälaite-tuoteosat: vain TATE-domain RAVA-koodit.
# Architectural KYL-* layers (walls, slabs, doors, windows, panels) and
# AR/K-prefix layers are intentionally absent — Lauri's project scope is
# refrigeration tooling, not building architecture.
#
# Use this profile via load_default_tate_only_profile(). The wider
# default_kylmalaite.toml stays as the default for back-compat.

[profile]
name = "Kylmälaite TATE-only v1"
ifc_schema = "IFC4"

# Refrigerant pipes — RAVA LVI-TUOTEOSA T-LVI-02 (general pipe category;
# system separation via system_name + Pset NominalDiameter).
[[rules]]
layer_pattern = "LT IMU"
ifc_type = "IfcPipeSegment"
predefined_type = "REFRIGERATION"
domain = "TATE"
lvi_code = "T-LVI-02"
system_name = "Refrigeration LT"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 22.0 } }

[[rules]]
layer_pattern = "MT IMU"
ifc_type = "IfcPipeSegment"
predefined_type = "REFRIGERATION"
domain = "TATE"
lvi_code = "T-LVI-02"
system_name = "Refrigeration MT"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 18.0 } }

[[rules]]
layer_pattern = "MT NESTE"
ifc_type = "IfcPipeSegment"
predefined_type = "REFRIGERATION"
domain = "TATE"
lvi_code = "T-LVI-02"
system_name = "Refrigeration MT"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 12.0 } }

# Defrost drain pipes — RAVA LVI-TUOTEOSA T-LVI-04-01-001 (Viemäriputki).
[[rules]]
layer_pattern = "KYL-VIEMARI*"
ifc_type = "IfcPipeSegment"
predefined_type = "DRAINPIPE"
domain = "TATE"
lvi_code = "T-LVI-04-01-001"
system_name = "Drainage"
pset_overrides = { Pset_PipeSegmentOccurrence = { NominalDiameter = 110.0 } }

# Cable carriers — RAVA TALOTEKNIIKKA-TUOTEOSA T-TATE-01-01-001 (Asennushylly).
[[rules]]
layer_pattern = "KAAPELIHYLLY*"
ifc_type = "IfcCableCarrierSegment"
predefined_type = "CABLETRUNKINGSEGMENT"
domain = "TATE"
talotekniikka_code = "T-TATE-01-01-001"
system_name = "Cable carriers"

# Refrigeration storage shelves — same Asennushylly category as cable
# carriers; Lauri's TATE-only scope keeps shelving (used to lay cooling
# equipment). KYL-TIKASHYLLY-V* must precede KYL-TIKASHYLLY* for first-match.
[[rules]]
layer_pattern = "KYL-TIKASHYLLY-V*"
entity_kind = "INSERT"
block_name = "KLHYLLYV"
ifc_type = "IfcFurniture"
domain = "TATE"
talotekniikka_code = "T-TATE-01-01-001"
system_name = "Cooling shelving"
default_height_mm = 2000

[[rules]]
layer_pattern = "KYL-TIKASHYLLY*"
entity_kind = "INSERT"
block_name = "KLHYLLY-TIKAS"
ifc_type = "IfcFurniture"
domain = "TATE"
talotekniikka_code = "T-TATE-01-01-001"
system_name = "Cooling shelving"
default_height_mm = 60

[[rules]]
layer_pattern = "KYL-LEVYHYLLY*"
entity_kind = "INSERT"
block_name = "KLHYLLY-LEVY"
ifc_type = "IfcFurniture"
domain = "TATE"
talotekniikka_code = "T-TATE-01-01-001"
system_name = "Cooling shelving"
default_height_mm = 60

# Cooling equipment — RAVA LVI-TUOTEOSA codes per Plan H Task 13.
[[rules]]
layer_pattern = "KYL-HOYRYSTIN*"
entity_kind = "INSERT"
block_name = "HOYRYSTIN"
ifc_type = "IfcEvaporator"
domain = "TATE"
lvi_code = "T-LVI-01-01-023"
system_name = "Refrigeration plant"

[[rules]]
layer_pattern = "KYL-LAUHDUTIN*"
entity_kind = "INSERT"
block_name = "LAUHDUTIN"
ifc_type = "IfcCondenser"
domain = "TATE"
lvi_code = "T-LVI-01-01-018"
system_name = "Refrigeration plant"

[[rules]]
layer_pattern = "KYL-KOMPRESSORI*"
entity_kind = "INSERT"
block_name = "KOMPRESSORI"
ifc_type = "IfcCompressor"
domain = "TATE"
lvi_code = "T-LVI-01-01-017"
system_name = "Refrigeration plant"

# Aspirational — KYL-KONEIKKO not yet drawn by any LISP, listed so the
# layer maps consistently when the block ships.
[[rules]]
layer_pattern = "KYL-KONEIKKO*"
entity_kind = "INSERT"
block_name = "KONEIKKO"
ifc_type = "IfcCompressor"
domain = "TATE"
lvi_code = "T-LVI-01-01-005"
system_name = "Refrigeration plant"
